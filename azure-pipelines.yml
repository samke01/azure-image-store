# CI/CD pipeline for the Flask app.
# It runs on a self hosted agent pool, the VM from app/vm.tf. The Deploy stage authenticates with az login --identity, logging in as the VM user assigned identity. That identity belongs to the clouddevops-deployers AD group, which holds Website Contributor on this one App Service. No service connection, service principal secret or publish profile lives in this file or in Azure DevOps settings.

trigger:
  branches:
    include:
      - master
  paths:
    include:
      - src
      - tests
      - azure-pipelines.yml

pool:
  name: clouddevops-agents # self hosted pool, the agent VM from app/vm.tf

# These values come from terraform output after terraform apply. resourceGroup is fixed
# (resource_group_name in terraform.tfvars). webAppName carries the random name suffix, so it
# is only known after apply, taken from the host part of terraform output app_service_url.
# uamiClientId is the agent identity from terraform output agent_identity_client_id, needed
# because the VM has only a user assigned identity. Set all three as pipeline variables in
# Azure DevOps under Pipeline, Edit, Variables rather than committing real values here. See the
# Pipeline variables section in SETUP.md for the mapping.
variables:
  webAppName: app-name-with-suffix # for example samkessproj-app-ab12c
  resourceGroup: clouddevops-app-rg
  uamiClientId: agent-uami-client-id # GUID from terraform output agent_identity_client_id

stages:
  - stage: Test
    displayName: Test
    jobs:
      - job: TestJob
        displayName: Run backend tests
        steps:
          # A venv keeps test deps off the agent's system Python. python3-venv and
          # python3-pip are installed on the agent by agent/setup-agent.sh.
          - script: |
              set -euo pipefail
              python3 -m venv .venv
              . .venv/bin/activate
              python -m pip install --upgrade pip
              pip install -r src/requirements.txt -r tests/requirements.txt
              pytest --junitxml=$(Build.ArtifactStagingDirectory)/test-results.xml
            displayName: Run pytest
          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: $(Build.ArtifactStagingDirectory)/test-results.xml
              failTaskOnFailedTests: true

  - stage: Build
    displayName: Build
    dependsOn: Test
    jobs:
      - job: BuildJob
        displayName: Package the app
        steps:
          # No pip install here. The app is shipped as a zip of src and Oryx runs
          # pip install on the App Service via SCM_DO_BUILD_DURING_DEPLOYMENT.
          - task: ArchiveFiles@2
            displayName: Zip src/
            inputs:
              rootFolderOrFile: src
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/deploy.zip
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: Publish artifact
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/deploy.zip
              ArtifactName: drop

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    jobs:
      - deployment: DeployJob
        displayName: Deploy to App Service
        pool:
          name: clouddevops-agents
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    az login --identity --username $(uamiClientId)
                    # Start first: a stopped App Service makes --async false poll
                    # "Starting the site..." forever. Idempotent if already running.
                    az webapp start \
                      --resource-group $(resourceGroup) \
                      --name $(webAppName)
                    # --track-status false skips the post-deploy runtime poll, which
                    # hangs for minutes on Linux App Service even on a successful deploy.
                    az webapp deploy \
                      --resource-group $(resourceGroup) \
                      --name $(webAppName) \
                      --src-path $(Pipeline.Workspace)/drop/deploy.zip \
                      --type zip \
                      --async false \
                      --track-status false
                  displayName: Deploy via agent's user-assigned managed identity

                - script: |
                    set -euo pipefail
                    BASE="https://$(webAppName).azurewebsites.net"
                    echo "Smoke testing $BASE"
                    # Retry to absorb cold start after deploy (~up to 2.5 min per page).
                    for path in / /upload; do
                      url="$BASE$path"
                      code=""
                      for attempt in $(seq 1 10); do
                        code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$url" || true)
                        if [ "$code" = "200" ]; then
                          echo "OK   $url -> $code"
                          break
                        fi
                        echo "wait $url -> ${code:-no response} (attempt $attempt)"
                        sleep 15
                      done
                      if [ "$code" != "200" ]; then
                        echo "FAIL $url did not return 200 (last: ${code:-no response})"
                        exit 1
                      fi
                    done
                    echo "Smoke test passed."
                  displayName: Smoke test the deployed app
